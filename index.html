<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FisioEstrategia Sevilla</title>
    <style>
        :root { --p: #10b981; --pd: #059669; --bg: #f8fafc; --t: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding-bottom: 50px; }
        
        .header { background: var(--pd); color: white; padding: 40px 20px; text-align: center; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; }
        .header h1 { margin: 0; font-size: 24px; font-weight: 800; }
        
        .main { max-width: 500px; margin: -25px auto 0; padding: 0 16px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .label-group { display: flex; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 8px; }
        .val { color: var(--pd); background: #ecfdf5; padding: 2px 8px; border-radius: 6px; }
        
        input[type=range] { width: 100%; height: 6px; accent-color: var(--p); cursor: pointer; }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: white; border-radius: 12px; margin-bottom: 8px; border: 1px solid #e2e8f0; cursor: pointer; }
        .item:active { background: #f1f5f9; }
        .name { font-weight: 700; font-size: 16px; }
        .info { font-size: 12px; color: #64748b; }
        .score { font-size: 20px; background: #f1f5f9; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        
        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; z-index: 100; }
        .modal.active { display: flex; }
        .content { background: white; width: 100%; max-width: 500px; margin: 0 auto; border-radius: 24px 24px 0 0; padding: 24px; }
        
        .btn-close { width: 100%; padding: 16px; border: none; background: #f1f5f9; border-radius: 12px; font-weight: 700; margin-top: 16px; cursor: pointer; }
        .links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .link { text-align: center; padding: 12px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; text-decoration: none; color: #1e293b; font-weight: 600; font-size: 13px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FisioEstrategia Sevilla</h1>
        <p style="margin:5px 0 0; opacity:0.8; font-size:14px;">Análisis v3.3</p>
    </div>
    
    <div class="main">
        <div class="card">
            <div class="label-group"><span>Población Mínima</span><span class="val" id="pv">10.000</span></div>
            <input type="range" id="pf" min="0" max="100000" step="5000" value="10000">
        </div>
        <div id="list"></div>
    </div>

    <div id="md" class="modal">
        <div class="content">
            <h2 id="mt" style="text-align:center; margin:0;"></h2>
            <p id="ms" style="text-align:center; color:#64748b;"></p>
            <div class="links">
                <a id="lm" target="_blank" class="link">📍 Mapa</a>
                <a id="li" target="_blank" class="link">🏠 Locales</a>
            </div>
            <button class="btn-close" onclick="document.getElementById('md').classList.remove('active')">CERRAR</button>
        </div>
    </div>

    <script>
        const data = [
            {n: "Brenes", p: 12500, c: 1}, {n: "El Viso del Alcor", p: 19200, c: 1},
            {n: "Guillena", p: 13500, c: 1}, {n: "Pilas", p: 14000, c: 1},
            {n: "Utrera", p: 51718, c: 4}, {n: "Dos Hermanas", p: 138981, c: 16},
            {n: "Carmona", p: 29551, c: 2}, {n: "Lebrija", p: 27674, c: 2},
            {n: "La Rinconada", p: 40162, c: 4}, {n: "Mairena Alcor", p: 23700, c: 2}
        ];

        function openModal(item) {
            const ratio = Math.round(item.p / item.c);
            document.getElementById('mt').innerText = item.n;
            document.getElementById('ms').innerText = `Ratio 1:${ratio.toLocaleString()}`;
            document.getElementById('lm').href = `https://www.google.com/maps/search/fisioterapia+en+${item.n}`;
            document.getElementById('li').href = `https://www.idealista.com/alquiler-locales/${item.n.toLowerCase().replace(/\s/g, '-')}-sevilla/`;
            document.getElementById('md').classList.add('active');
        }

        function render() {
            const v = document.getElementById('pf').value;
            document.getElementById('pv').innerText = parseInt(v).toLocaleString();
            const list = document.getElementById('list');
            list.innerHTML = '';
            
            data.filter(d => d.p >= v)
                .sort((a,b) => (b.p/b.c) - (a.p/a.c))
                .forEach(item => {
                    const ratio = Math.round(item.p/item.c);
                    const emoji = ratio > 10000 ? "🟢" : "🟡";
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.onclick = () => openModal(item);
                    div.innerHTML = `<div><div class="name">${item.n}</div><div class="info">Ratio 1:${ratio.toLocaleString()}</div></div><div class="score">${emoji}</div>`;
                    list.appendChild(div);
                });
        }

        document.getElementById('pf').oninput = render;
        window.onload = render;
    </script>
</body>
</html>
